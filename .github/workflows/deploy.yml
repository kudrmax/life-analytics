name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'

  test:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: la_user
          POSTGRES_PASSWORD: la_password
          POSTGRES_DB: life_analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U la_user -d life_analytics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      LA_SECRET_KEY: test-secret-key
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r backend/requirements-test.txt
      - name: Run tests
        working-directory: backend
        run: python -m pytest -n auto

  lint-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check JS syntax
        run: |
          for f in frontend/js/*.js; do
            node --check "$f"
          done

  deploy:
    needs: [changes, test, lint-js]
    if: always() && !failure() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/life-analytics
            git pull origin master
            docker compose up -d --build --remove-orphans
            docker image prune -f
