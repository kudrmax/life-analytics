<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Life Analytics">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <title>Life Analytics</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.min.js"></script>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" title="Переключить тему">
        <span class="theme-icon">🌙</span>
    </button>

    <div id="main"></div>

    <nav>
        <div class="nav-inner">
            <button data-page="today">
                <i data-lucide="calendar-check"></i>
                <span>Сегодня</span>
            </button>
            <button data-page="dashboard">
                <i data-lucide="bar-chart-3"></i>
                <span>Статистика</span>
            </button>
            <button data-page="history">
                <i data-lucide="history"></i>
                <span>История</span>
            </button>
            <button data-page="settings">
                <i data-lucide="settings"></i>
                <span>Настройки</span>
            </button>
        </div>
    </nav>

    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@^1/picker.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="config.js"></script>
    <script src="js/aw-client.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
