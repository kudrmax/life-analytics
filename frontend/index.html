<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Life Analytics">
    <link rel="apple-touch-icon" href="/icons/icon-180.png">
    <title>Life Analytics</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
    <link rel="stylesheet" href="css/style.css">
    <script src="vendor/lucide.min.js"></script>
</head>
<body>
    <div id="main"></div>

    <nav>
        <div class="nav-inner">
            <button data-page="today">
                <i data-lucide="calendar-check"></i>
                <span>Сегодня</span>
            </button>
            <button data-page="charts">
                <i data-lucide="bar-chart-3"></i>
                <span>Статистика</span>
            </button>
            <button data-page="analysis">
                <i data-lucide="scatter-chart"></i>
                <span>Анализ</span>
            </button>
            <button data-page="insights">
                <i data-lucide="lightbulb"></i>
                <span>Выводы</span>
            </button>
            <button data-page="history">
                <i data-lucide="history"></i>
                <span>История</span>
            </button>
            <button data-page="settings">
                <i data-lucide="settings"></i>
                <span>Настройки</span>
            </button>
        </div>
    </nav>

    <script type="module" src="vendor/picker.js"></script>
    <script src="vendor/chart.umd.min.js"></script>
    <script src="config.js"></script>
    <script src="js/aw-client.js"></script>
    <script src="js/api.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
