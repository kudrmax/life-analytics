services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-la_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-la_password}
      POSTGRES_DB: ${POSTGRES_DB:-life_analytics}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-la_user} -d ${POSTGRES_DB:-life_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5
    command: >
      postgres
      -c shared_buffers=128MB
      -c effective_cache_size=256MB
      -c work_mem=4MB
      -c maintenance_work_mem=64MB
      -c max_connections=20
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://la_user:la_password@db:5432/life_analytics}
      LA_SECRET_KEY: ${LA_SECRET_KEY:-dev-secret-key-change-in-production}
      TODOIST_CLIENT_ID: ${TODOIST_CLIENT_ID:-}
      TODOIST_CLIENT_SECRET: ${TODOIST_CLIENT_SECRET:-}
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
    deploy:
      resources:
        limits:
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  backup:
    build: ./backup
    restart: unless-stopped
    profiles:
      - backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-la_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-la_password}
      POSTGRES_DB: ${POSTGRES_DB:-life_analytics}
      POSTGRES_HOST: db
      YADISK_TOKEN: ${YADISK_TOKEN}
      YADISK_BACKUP_PATH: ${YADISK_BACKUP_PATH:-/life-analytics-backups/}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-360}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
      BACKUP_PREFIX: ${BACKUP_PREFIX:-life_analytics}
    volumes:
      - ./backups:/backups
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  pgdata:
