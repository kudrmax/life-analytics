services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-la_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-la_password}
      POSTGRES_DB: ${POSTGRES_DB:-life_analytics}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-la_user} -d ${POSTGRES_DB:-life_analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://la_user:la_password@db:5432/life_analytics}
      LA_SECRET_KEY: ${LA_SECRET_KEY:-dev-secret-key-change-in-production}
      TODOIST_CLIENT_ID: ${TODOIST_CLIENT_ID:-}
      TODOIST_CLIENT_SECRET: ${TODOIST_CLIENT_SECRET:-}
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"

  backup:
    build: ./backup
    restart: unless-stopped
    profiles:
      - backup
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-la_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-la_password}
      POSTGRES_DB: ${POSTGRES_DB:-life_analytics}
      POSTGRES_HOST: db
      YADISK_TOKEN: ${YADISK_TOKEN}
      YADISK_BACKUP_PATH: ${YADISK_BACKUP_PATH:-/life-analytics-backups/}
      BACKUP_INTERVAL_MINUTES: ${BACKUP_INTERVAL_MINUTES:-360}
      BACKUP_RETAIN_DAYS: ${BACKUP_RETAIN_DAYS:-30}
    volumes:
      - ./backups:/backups

volumes:
  pgdata:
